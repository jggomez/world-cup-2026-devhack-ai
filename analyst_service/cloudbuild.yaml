steps:
  # 1. Build the Docker image using the current folder as context
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/world-cup-analyst-service:$BUILD_ID'
      - '.'

  # 2. Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/world-cup-analyst-service:$BUILD_ID'

  # 3. Deploy the container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'world-cup-analyst-service'
      - '--image'
      - 'gcr.io/$PROJECT_ID/world-cup-analyst-service:$BUILD_ID'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GOOGLE_GENAI_USE_VERTEXAI=False,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=us-central1'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--set-secrets'
      - 'GEMINI_API_KEY=GOOGLE_GENAI_API_KEY:latest,GOOGLE_API_KEY=GOOGLE_GENAI_API_KEY:latest,GOOGLE_GENAI_API_KEY=GOOGLE_GENAI_API_KEY:latest'

images:
  - 'gcr.io/$PROJECT_ID/world-cup-analyst-service:$BUILD_ID'
